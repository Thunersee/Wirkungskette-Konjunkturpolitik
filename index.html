const tabsEl = document.getElementById("tabs");
const chainsEl = document.getElementById("chains");

data.forEach(d => {
  const btn = document.createElement("button");
  btn.className = "tab";
  btn.textContent = d.title;
  btn.dataset.id = d.id;
  btn.dataset.group = d.group;
  btn.onclick = () => show(d.id);
  tabsEl.appendChild(btn);
});

function show(id) {
  const d = data.find(x => x.id === id);
  document.querySelectorAll(".tab").forEach(t => {
    t.className = "tab" + (t.dataset.id === id ? " active-" + d.group : "");
  });
  const gc = d.group;
  let html = '<div class="chain visible">';
  d.steps.forEach((s, i) => {
    if (i > 0) html += '<div class="step-row"><div class="arrow-col">\u2193</div></div>';
    html += '<div class="step-row"><div class="step-box ' + gc + '-bg"><div class="label ' + gc + '-label">' + s.label + '</div><div class="text">' + s.text + '</div></div></div>';
  });
  html += '<div class="conflict-box"><div class="ch">\u26A0\uFE0E Zielkonflikte</div>';
  d.conflicts.forEach(c => {
    html += '<div class="conflict-item"><span class="conflict-icon">\u2022</span><span class="conflict-text">' + c + '</span></div>';
  });
  html += '</div>';
  html += '<div class="cross-box"><div class="ch">\u2194 ' + d.cross.title + '</div><div class="text">' + d.cross.text + '</div></div>';
  html += '<button class="deep-btn" onclick="toggleDeep(this)">Wirkungskette vertiefen <span class="arrow">\u25B6</span></button>';
  html += '<div class="deep-content" id="deep-' + d.id + '">' + d.deep + '</div>';
  html += '</div>';
  chainsEl.innerHTML = html;
}

function toggleDeep(btn) {
  btn.classList.toggle("open");
  const content = btn.nextElementSibling;
  content.classList.toggle("visible");
}

show("f1");
</script>
